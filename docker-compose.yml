version: "3.8"

services:
  db:
    image: postgres:15
    container_name: qrono-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 0000
      POSTGRES_DB: qrono
    ports:
      - "5432:5432"
    volumes:
      - qrono_data:/var/lib/postgresql/data

volumes:
  qrono_data: